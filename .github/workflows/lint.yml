name: lint

permissions:
  contents: read

on:
  push:
    tags-ignore:
      - '*'
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_call:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Open ssh debug session.'
        required: true
        default: false
        type: boolean

jobs:

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # run static analysis on bleeding and trailing edges
        python-version: ['3.10', '3.12', '3.14']
        django-version:
          - 'dj42' # LTS April 2026
          - 'dj52' # LTS April 2028
          - 'dj60' # April 2027
        exclude:
          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.14'
            django-version: 'dj42'

          - python-version: '3.10'
            django-version: 'dj52'
          - python-version: '3.14'
            django-version: 'dj52'

          - python-version: '3.10'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

    env:
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        id: sp
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: false
      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
      - name: Install Emacs
        if: ${{ github.event.inputs.debug == 'true' }}
        run: |
          sudo apt install emacs
      - name: Setup tmate session
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113
        timeout-minutes: 60
      - name: Run Static Analysis
        env:
          PYTHON_PATH: ${{ steps.sp.outputs.python-path }}
        run: |
          just check -p "$PYTHON_PATH" --group "$TEST_DJANGO_VERSION"
